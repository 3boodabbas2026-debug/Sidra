<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060913">
<title>إلى سيدرا</title>

<!-- Elegant Arabic fonts (Amiri for the messages, Tajawal for UI) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #060913;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Tajawal', sans-serif;
  }

  /* ── Layers ─────────────────────────────────────────────── */
  #scene-container { position: fixed; inset: 0; z-index: 1; }
  #fx-canvas       { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

  /* Cinematic vignette over the 3D scene */
  #vignette {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 42%, rgba(2, 4, 12, .38) 78%, rgba(1, 2, 8, .72) 100%);
  }

  /* ── Intro overlay (first tap = music unlock) ───────────── */
  #intro {
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 38%, #0e1735 0%, #060913 72%);
    transition: opacity 1.8s ease;
    cursor: pointer;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }
  #intro h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(2.4rem, 10vw, 4.5rem);
    color: #f7f3e8;
    animation: introGlow 3s ease-in-out infinite, introIn 2.4s ease both;
  }
  #intro p {
    margin-top: 1.2rem;
    font-size: clamp(.9rem, 4vw, 1.15rem);
    color: rgba(215, 222, 245, .75);
    letter-spacing: .5px;
    animation: softPulse 2.4s ease-in-out infinite, introIn 2.4s .8s ease both;
  }
  @keyframes introIn {
    from { opacity: 0; transform: translateY(16px) scale(.97); filter: blur(6px); }
    to   { opacity: 1; transform: none; filter: blur(0); }
  }
  @keyframes introGlow {
    0%, 100% { text-shadow: 0 0 25px rgba(255,240,200,.35), 0 0 55px rgba(160,190,255,.2); }
    50%      { text-shadow: 0 0 45px rgba(255,240,200,.7),  0 0 95px rgba(160,190,255,.4); }
  }
  @keyframes softPulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }

  /* ── Hints ──────────────────────────────────────────────── */
  .hint {
    position: fixed; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Tajawal', sans-serif;
    font-size: clamp(.85rem, 4vw, 1.05rem);
    color: rgba(230, 235, 250, .85);
    text-shadow: 0 0 12px rgba(180, 200, 255, .55), 0 1px 6px rgba(0,0,0,.8);
    animation: softPulse 2.2s ease-in-out infinite;
    opacity: 0; transition: opacity 1.5s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  #hint        { bottom: 6vh; }
  #bubble-hint { top: 4.5vh; }
  .hint.visible { opacity: 1; }
  .hint.gone    { opacity: 0 !important; }

  #music-btn {
    position: fixed; left: 1rem; top: 1rem;
    z-index: 25;
    width: 44px; height: 44px;
    display: grid; place-items: center;
    border: 1px solid rgba(235, 240, 255, .28);
    border-radius: 50%;
    background: rgba(8, 12, 27, .48);
    color: rgba(245, 239, 224, .9);
    font: 700 1.25rem/1 'Tajawal', sans-serif;
    box-shadow: 0 0 18px rgba(150, 185, 255, .22), inset 0 0 14px rgba(255, 255, 255, .05);
    opacity: 0;
    pointer-events: none;
    transform: scale(.9);
    transition: opacity .7s ease, transform .7s ease, border-color .4s ease, color .4s ease;
  }
  #music-btn.visible {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }
  #music-btn.playing {
    color: #fff3c8;
    border-color: rgba(255, 235, 176, .55);
    box-shadow: 0 0 22px rgba(255, 220, 150, .36), inset 0 0 14px rgba(255, 255, 255, .06);
  }

  /* ── Floating Arabic messages ───────────────────────────── */
  #messages { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
  .msg {
    position: absolute; left: 0; top: 0;
    max-width: min(56vw, 300px);
    text-align: center;
    font-family: 'Amiri', serif;
    font-size: clamp(.92rem, 4vw, 1.3rem);
    font-weight: 700;
    line-height: 1.8;
    color: #f6f1e3;
    direction: rtl;
    text-shadow:
      0 0 10px rgba(255, 244, 214, .55),
      0 0 26px rgba(150, 180, 255, .35),
      0 2px 8px rgba(0, 0, 0, .85);
    opacity: 0;
    filter: blur(7px);
    transition: opacity 2.6s ease, filter 2.6s ease;
    will-change: transform;
    pointer-events: auto;      /* messages are touchable */
    cursor: grab;
  }
  .msg.visible { opacity: 1; filter: blur(0); }

  /* 🫧 When she taps a message it becomes a bubble she can throw —
     just a soft halo of light around the words, nothing solid */
  .msg.bubble {
    padding: .9rem 1.3rem;
    background: radial-gradient(ellipse at center,
      rgba(180, 208, 255, .14), rgba(180, 208, 255, .05) 55%, transparent 75%);
    border-radius: 50%;
    animation: bubblePop .45s ease;
  }
  .msg.bubble:active { cursor: grabbing; }
  @keyframes bubblePop {
    0%   { scale: 1; }
    45%  { scale: 1.14; }
    100% { scale: 1; }
  }

  /* ── Buttons: pure glowing text, nothing behind them ────── */
  #gallery-btn, #moon-btn, #moon-back {
    position: fixed; left: 50%;
    transform: translateX(-50%) scale(.9);
    z-index: 20;
    padding: .55rem 1.7rem;          /* generous invisible tap target */
    font-family: 'Amiri', serif;
    font-weight: 700;
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0; pointer-events: none;
    transition: opacity 2s ease, transform 2s ease;
  }
  #gallery-btn {
    bottom: 5vh;
    font-size: clamp(1.05rem, 4.6vw, 1.3rem);
    color: #fdf6e4;
    animation: textGlowWarm 2.8s ease-in-out infinite;
  }
  #moon-btn, #moon-back {
    font-size: clamp(1rem, 4.4vw, 1.25rem);
    color: #eef3ff;
    animation: textGlowCool 3.2s ease-in-out infinite;
  }
  #moon-btn  { bottom: 12.5vh; }
  #moon-back { bottom: 4vh; }
  #gallery-btn.visible, #moon-btn.visible, #moon-back.visible {
    opacity: 1; pointer-events: auto;
    transform: translateX(-50%) scale(1);
  }
  #gallery-btn.gone, #moon-btn.gone { opacity: 0 !important; pointer-events: none !important; }
  @keyframes textGlowWarm {
    0%, 100% { text-shadow: 0 0 10px rgba(255,236,190,.4),  0 0 26px rgba(255,214,140,.2),  0 2px 6px rgba(0,0,0,.8); }
    50%      { text-shadow: 0 0 18px rgba(255,236,190,.85), 0 0 48px rgba(255,214,140,.45), 0 2px 6px rgba(0,0,0,.8); }
  }
  @keyframes textGlowCool {
    0%, 100% { text-shadow: 0 0 10px rgba(170,200,255,.45), 0 0 26px rgba(150,185,255,.22), 0 2px 6px rgba(0,0,0,.8); }
    50%      { text-shadow: 0 0 20px rgba(190,215,255,.9),  0 0 50px rgba(150,185,255,.5),  0 2px 6px rgba(0,0,0,.8); }
  }

  #moon-lines {
    position: fixed; left: 50%; top: 58vh;   /* JS pins this under the moon */
    transform: translateX(-50%);
    z-index: 15;
    width: 92vw;
    display: flex; flex-direction: column; align-items: center;
    gap: .5rem;
    pointer-events: none;
  }
  .moon-line {
    font-family: 'Amiri', serif;
    font-size: clamp(1.05rem, 4.6vw, 1.5rem);
    font-weight: 700;
    color: #f2f5ff;
    direction: rtl;
    text-align: center;
    text-shadow:
      0 0 12px rgba(180, 205, 255, .6),
      0 0 34px rgba(140, 175, 255, .35),
      0 2px 8px rgba(0, 0, 0, .85);
    opacity: 0;
    transform: translateY(12px);
    filter: blur(6px);
    transition: opacity 2.2s ease, transform 2.2s ease, filter 2.2s ease;
  }
  .moon-line.visible { opacity: 1; transform: none; filter: blur(0); }
  .moon-line:last-child {
    font-size: clamp(1.3rem, 5.8vw, 1.9rem);
    color: #fff8ea;
    text-shadow:
      0 0 16px rgba(255, 240, 205, .75),
      0 0 44px rgba(170, 200, 255, .5),
      0 2px 8px rgba(0, 0, 0, .85);
  }

  /* her name, shimmering beneath the moon itself */
  #moon-name {
    position: fixed; left: 0; top: 0;
    z-index: 15;
    font-family: 'Amiri', serif;
    font-size: clamp(2.1rem, 10vw, 3.8rem);
    font-weight: 700;
    color: #fdfdff;
    direction: rtl;
    text-shadow:
      0 0 18px rgba(220, 232, 255, .85),
      0 0 55px rgba(170, 200, 255, .55),
      0 0 110px rgba(150, 185, 255, .35);
    opacity: 0;
    transition: opacity 2.6s ease;
    pointer-events: none;
    will-change: transform;
    animation: introGlow 3.4s ease-in-out infinite;
  }
  #moon-name.visible { opacity: 1; }

  /* messages fade away softly while she's with the moon */
  #messages { transition: opacity 1.2s ease; }

  /* ── 📖 The memory book, read by candlelight ────────────── */
  #gallery {
    position: fixed; inset: 0; z-index: 60;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 62%,
      rgba(28, 20, 8, .78), rgba(3, 5, 14, .985) 78%);
    opacity: 0; pointer-events: none;
    transition: opacity .7s ease;
  }
  #gallery.open { opacity: 1; pointer-events: auto; }

  /* a real open book: two pages meeting at a spine in the middle */
  #book {
    position: relative;
    width: min(92vw, 600px);
    aspect-ratio: 17 / 11;
    perspective: 2000px;
    filter: drop-shadow(0 24px 42px rgba(0, 0, 0, .65));
    cursor: pointer;
  }
  .half {
    position: absolute; top: 0; height: 100%; width: 50%;
    display: flex; flex-direction: column; align-items: center;
    opacity: 0;
    transition: opacity .9s ease .4s;   /* pages appear as the cover lifts */
  }
  #book.opened .half { opacity: 1; }
  #page-right { right: 0; border-radius: 3px 12px 12px 3px; }
  #page-left  { left: 0;  border-radius: 12px 3px 3px 12px; }
  .paper {
    background:
      radial-gradient(ellipse at 30% 18%, rgba(255,255,255,.4), transparent 55%),
      linear-gradient(160deg, #f8efdd 0%, #f0e4c8 55%, #e6d5b1 100%);
  }
  .paper-r { box-shadow: inset 16px 0 24px rgba(120, 90, 40, .25),
                         inset -2px 2px 8px rgba(255, 255, 255, .5); }
  .paper-l { box-shadow: inset -16px 0 24px rgba(120, 90, 40, .25),
                         inset 2px 2px 8px rgba(255, 255, 255, .5); }
  /* the spine crease between the two pages */
  #book::before {
    content: '';
    position: absolute; left: 50%; top: 1%; bottom: 1%;
    width: 16px;
    transform: translateX(-50%);
    background: linear-gradient(90deg,
      rgba(60, 40, 15, 0), rgba(60, 40, 15, .4), rgba(60, 40, 15, 0));
    z-index: 4;
    pointer-events: none;
    opacity: 0;
    transition: opacity .9s ease .4s;
  }
  #book.opened::before { opacity: 1; }
  #book img {
    width: 86%; height: 72%;
    margin-top: 6%;
    object-fit: cover;
    border: 5px solid #fffdf4;
    border-radius: 3px;
    box-shadow: 0 4px 14px rgba(90, 60, 20, .35);
    filter: sepia(.14) contrast(.97);
    background: #e8e0cc;
  }
  .page-num {
    margin-top: auto; margin-bottom: 3%;
    font-family: 'Amiri', serif;
    color: #7a5f3a;
    font-size: .9rem;
    letter-spacing: 1px;
    direction: ltr;
  }
  /* the leaf that turns over the spine: it lives on the left half
     and rotates around the spine onto the right half */
  #page-leaf {
    position: absolute; top: 0; left: 0;
    width: 50%; height: 100%;
    border-radius: 12px 3px 3px 12px;
    transform-origin: right center;
    transform-style: preserve-3d;
    will-change: transform;
    display: none; z-index: 6;
    filter: drop-shadow(-14px 10px 16px rgba(30, 18, 5, .38));
  }
  .leaf-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: inherit;
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
  }
  .leaf-back-face { transform: rotateY(180deg); }

  /* the leather cover sits on the right half (an Arabic book) and
     swings open across the spine */
  #cover {
    position: absolute; top: 0; right: 0;
    width: 50%; height: 100%;
    border-radius: 3px 12px 12px 3px;
    transform-origin: left center;
    transform-style: preserve-3d;
    will-change: transform;
    z-index: 10;
    transition: transform 1.6s cubic-bezier(.45,.05,.2,1);
  }
  #cover.open { transform: rotateY(-178deg); }
  #cover.away { visibility: hidden; }
  .cover-front {
    justify-content: center;
    gap: .7rem;
    background:
      radial-gradient(ellipse at 30% 22%, rgba(255,255,255,.07), transparent 55%),
      linear-gradient(150deg, #2a3560 0%, #1b2547 55%, #121a34 100%);
    box-shadow: inset -12px 0 20px rgba(0, 0, 0, .5);
  }
  .cover-front::before {
    content: '';
    position: absolute; inset: 12px;
    border: 1.5px solid rgba(212, 181, 116, .75);
    border-radius: 7px;
    box-shadow: 0 0 14px rgba(212, 181, 116, .25), inset 0 0 14px rgba(212, 181, 116, .15);
    pointer-events: none;
  }
  .cover-title {
    font-family: 'Amiri', serif;
    font-size: clamp(1.7rem, 7vw, 2.3rem);
    font-weight: 700;
    color: #e8cf9a;
    text-shadow: 0 0 14px rgba(212, 181, 116, .45);
  }
  .cover-sub {
    font-family: 'Amiri', serif;
    font-size: clamp(1rem, 4vw, 1.2rem);
    color: rgba(232, 207, 154, .8);
  }

  /* 🕯️ candles beside the book */
  .candle { position: absolute; z-index: 2; pointer-events: none; }
  .candle-left  { left: max(4vw, 14px);  bottom: 13vh; }
  .candle-right { right: max(4vw, 14px); bottom: 20vh; transform: scale(.8); }
  .candle::before {                 /* the warm breathing halo */
    content: '';
    position: absolute; left: 50%; top: -52px;
    width: 200px; height: 200px;
    transform: translateX(-50%);
    background: radial-gradient(circle,
      rgba(255, 190, 90, .3), rgba(255, 160, 60, .08) 45%, transparent 70%);
    animation: haloFlick 2.3s ease-in-out infinite;
  }
  .flame {
    width: 13px; height: 24px;
    margin: 0 auto;
    background: radial-gradient(ellipse at 50% 78%,
      #fff8dd 0%, #ffd977 42%, #ff9c3a 78%, rgba(255,110,20,0) 100%);
    border-radius: 50% 50% 42% 42% / 68% 68% 32% 32%;
    transform-origin: 50% 95%;
    animation: flick 1.9s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(255, 180, 80, .9));
  }
  .wick { width: 2px; height: 6px; margin: -1px auto 0; background: #3a2a1a; }
  .wax {
    width: 24px; height: 88px;
    margin: 0 auto;
    border-radius: 7px 9px 4px 4px;
    background: linear-gradient(105deg, #f8ecd0 0%, #ecd9ae 55%, #c9ad7c 100%);
    box-shadow: inset -6px 0 9px rgba(120, 85, 35, .35), 0 6px 14px rgba(0,0,0,.5);
  }
  .candle-right .wax { height: 56px; }   /* half-melted */
  @keyframes flick {
    0%, 100% { transform: scaleY(1) rotate(-2deg); }
    28%      { transform: scale(1.08, 1.14) rotate(2.5deg); }
    55%      { transform: scale(.94, .88) rotate(-3deg); }
    80%      { transform: scale(1.04, 1.06) rotate(1.5deg); }
  }
  @keyframes haloFlick { 0%, 100% { opacity: .8; } 30% { opacity: 1; } 60% { opacity: .6; } }

  .g-nav {
    position: absolute; top: 50%;
    transform: translateY(-50%);
    width: 54px; height: 54px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    color: rgba(240, 232, 210, .9);
    text-shadow: 0 0 12px rgba(255, 220, 150, .5);
    background: none; border: none;
    cursor: pointer;
    z-index: 3;
    user-select: none;
  }
  #g-next { left: 2vw; }    /* Arabic book: forward = the left page turns right */
  #g-prev { right: 2vw; }
  #g-close {
    position: absolute; top: 3.5vh; right: 5vw;
    font-size: 1.6rem;
    color: rgba(240, 236, 223, .85);
    text-shadow: 0 0 10px rgba(255, 255, 255, .35);
    cursor: pointer;
    width: 46px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    z-index: 3;
  }
</style>
</head>
<body>

<div id="scene-container"></div>
<canvas id="fx-canvas"></canvas>
<div id="vignette"></div>

<!-- Intro screen — her first tap here also starts the music -->
<div id="intro">
  <h1>إلى سيدرا</h1>
  <p>المسي الشاشة للدخول</p>
</div>

<div id="hint" class="hint">اضغطي على الوردة</div>
<div id="bubble-hint" class="hint">المسي أي رسالة وحرّكيها متل الفقاعة</div>
<div id="messages"></div>
<button id="music-btn" type="button" aria-label="Music" title="Music">♪</button>

<button id="gallery-btn">ذكرياتنا</button>

<!-- 🌙 The moon act: camera leaves the flower and rises to the moon -->
<button id="moon-btn">وفي شي كمان…</button>
<div id="moon-lines">
  <div class="moon-line">احترت شو أهديكي… الوردة ولّا القمر؟</div>
  <div class="moon-line">التنين حلوين، والتنين بيشبهوكي</div>
  <div class="moon-line">الورد بيحكي عن جمالك وطيبة قلبك</div>
  <div class="moon-line">بس القمر… هو اللي بيحكي عن جمال روحك</div>
</div>
<div id="moon-name">سيدرا</div>
<button id="moon-back">رجوع للوردة</button>

<!-- 📖 The memory book, read by candlelight -->
<div id="gallery">
  <div id="g-close">✕</div>

  <div class="candle candle-left">
    <div class="flame"></div><div class="wick"></div><div class="wax"></div>
  </div>
  <div class="candle candle-right">
    <div class="flame"></div><div class="wick"></div><div class="wax"></div>
  </div>

  <div id="book">
    <!-- the two open pages -->
    <div id="page-right" class="half paper paper-r">
      <img id="img-right" alt="">
      <div class="page-num" id="num-right"></div>
    </div>
    <div id="page-left" class="half paper paper-l">
      <img id="img-left" alt="">
      <div class="page-num" id="num-left"></div>
    </div>
    <!-- the leaf that turns over the spine -->
    <div id="page-leaf">
      <div class="leaf-face paper paper-l"><img id="leaf-front-img" alt=""></div>
      <div class="leaf-face leaf-back-face paper paper-r"><img id="leaf-back-img" alt=""></div>
    </div>
    <!-- the closed leather cover (right half — an Arabic book) -->
    <div id="cover">
      <div class="leaf-face cover-front">
        <div class="cover-title">ذكرياتنا</div>
        <div class="cover-sub">لسيدرا</div>
      </div>
      <div class="leaf-face leaf-back-face paper paper-r"></div>
    </div>
  </div>

  <div class="g-nav" id="g-next">‹</div>
  <div class="g-nav" id="g-prev">›</div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     🎵 MUSIC — music.mp3 in this folder. preload="none" is important:
     the file is large, so it streams when she taps instead of
     blocking the whole page load.
     ══════════════════════════════════════════════════════════════ -->
<audio id="bg-music" loop preload="none">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Three.js r128 (stable build, works on all mobile browsers) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ════════════════════════════════════════════════════════════════
   ⚙️  EASY CONFIG
   ════════════════════════════════════════════════════════════════ */

/* 🖼️ Your Snapchat memories — photo files inside the "memories"
   folder. They appear as pages of the book, in this order.
   (Photos only — the book doesn't show videos.)                  */
const MEMORIES = [
  'memories/Snapchat-1012999025.jpg',
  'memories/Snapchat-111030093.jpg',
  'memories/Snapchat-1131213415.jpg',
  'memories/Snapchat-1173149521.jpg',
  'memories/Snapchat-1308862633.jpg',
  'memories/Snapchat-1328236937.jpg',
  'memories/Snapchat-1395687425.jpg',
  'memories/Snapchat-1430855067.jpg',
  'memories/Snapchat-1570814807.jpg',
  'memories/Snapchat-1626314042.jpg',
  'memories/Snapchat-16872832.jpg',
  'memories/Snapchat-1764516401.jpg',
  'memories/Snapchat-193927078.jpg',
  'memories/Snapchat-2041602214.jpg',
  'memories/Snapchat-422275962.jpg',
  'memories/Snapchat-518263990.jpg',
  'memories/Snapchat-607829568.jpg',
  'memories/Snapchat-659360062.jpg',
  'memories/Snapchat-727248920.jpg',
  'memories/Snapchat-935623086.jpg',
];

/* 💬 The messages that orbit the flower (tap one → it becomes a
   bubble she can drag and throw around the screen)               */

/* Volume of the background music (0.0 → 1.0) */
const MUSIC_VOLUME = 0.82;

/* ════════════════════════════════════════════════════════════════
   🌲 The experience — a moonlit forest clearing, one white lily
   ════════════════════════════════════════════════════════════════ */
(function () {
  'use strict';

  const isSmallScreen = Math.min(innerWidth, innerHeight) < 700;

  /* ── Renderer / scene / camera ────────────────────────────── */
  const container = document.getElementById('scene-container');
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a1122, 0.024);

  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 300);

  let renderer;
  try {
    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  } catch (e) {
    document.getElementById('intro').innerHTML =
      '<h1 style="font-size:1.4rem">متصفحك ما بيدعم WebGL</h1>';
    return;
  }
  // capped pixel ratio = sharp but never laggy on high-DPI phones
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, isSmallScreen ? 1.5 : 1.75));
  renderer.setSize(innerWidth, innerHeight);
  container.appendChild(renderer.domElement);

  const HEAD_Y = 4.3;
  const lookTarget = new THREE.Vector3(0, HEAD_Y, 0);

  /* Camera state machine: 'front' → 'transition' → 'top' */
  const FRONT_VIEW = { radius: 11.0, phi: 1.34, theta: 0 };
  const TOP_VIEW   = { radius: 10.0, phi: 0.10, theta: 0.6 };
  const TRANSITION_SECS = 2.8;
  const camState = { mode: 'front', theta: 0, tStart: 0, from: null, to: null };

  function sphericalPos(radius, phi, theta) {
    return new THREE.Vector3(
      radius * Math.sin(phi) * Math.sin(theta),
      HEAD_Y + radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.cos(theta)
    );
  }
  function applySpherical(radius, phi, theta) {
    camera.position.copy(sphericalPos(radius, phi, theta));
    camera.lookAt(lookTarget);
  }
  applySpherical(FRONT_VIEW.radius, FRONT_VIEW.phi, FRONT_VIEW.theta);

  /* where the camera stands during the moon act (lily low in frame,
     moon high above) and the animated look-at point */
  /* stand on the far side of the clearing so the lily stays out of
     frame and the words float in clean sky */
  const MOON_CAM_POS = new THREE.Vector3(-11, 3.2, -21);
  /* look a bit below the moon so it floats in the upper part of the
     screen, leaving room beneath it for her name and the words */
  const MOON_LOOK_OFFSET = new THREE.Vector3(0, -14, 0);
  const lookAtV = new THREE.Vector3();

  /* ── Lights ───────────────────────────────────────────────── */
  scene.add(new THREE.AmbientLight(0x2c3658, 1.0));

  const moonLight = new THREE.DirectionalLight(0xaabfff, 0.9);
  moonLight.position.set(-18, 26, -20);
  scene.add(moonLight);

  const warmGlow = new THREE.PointLight(0xffd9a0, 1.1, 28);
  warmGlow.position.set(3, 7, 4);
  scene.add(warmGlow);

  const underGlow = new THREE.PointLight(0xbcd0ff, 0.45, 14);
  underGlow.position.set(0, 1.5, 2.5);
  scene.add(underGlow);

  /* ── Shared textures ──────────────────────────────────────── */
  function makeGlowTexture(inner, outer) {
    const c = document.createElement('canvas');
    c.width = c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    g.addColorStop(0, inner);
    g.addColorStop(0.35, outer);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 128, 128);
    return new THREE.CanvasTexture(c);
  }
  const glowTexWarm = makeGlowTexture('rgba(255,246,214,1)', 'rgba(255,214,140,0.5)');
  const glowTexCool = makeGlowTexture('rgba(235,242,255,1)', 'rgba(160,190,255,0.4)');
  const glowTexTeal = makeGlowTexture('rgba(210,255,240,1)', 'rgba(110,230,190,0.4)');

  /* ── Night sky dome with a hand-painted gradient ──────────── */
  (function buildSky() {
    const c = document.createElement('canvas');
    c.width = 64; c.height = 512;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 0, 512);
    g.addColorStop(0.0, '#04060e');   // zenith
    g.addColorStop(0.45, '#0a1128');
    g.addColorStop(0.72, '#14224a');  // glow near the horizon
    g.addColorStop(0.88, '#1b3055');
    g.addColorStop(1.0, '#0d1830');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 64, 512);
    const tex = new THREE.CanvasTexture(c);
    const sky = new THREE.Mesh(
      new THREE.SphereGeometry(140, 24, 16),
      new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide, fog: false })
    );
    scene.add(sky);
  })();

  /* ── 🌙 The moon: a real cratered sphere with halo & clouds ── */
  const MOON_POS = new THREE.Vector3(-55, 62, -95);
  let moonMesh, moonHalo, moonInner;
  const moonClouds = [];
  (function buildMoon() {
    // hand-painted moon surface: soft shading + gentle craters
    const c = document.createElement('canvas');
    c.width = 512; c.height = 256;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#eaf0fe';
    ctx.fillRect(0, 0, 512, 256);
    const shade = ctx.createLinearGradient(0, 0, 0, 256);
    shade.addColorStop(0, 'rgba(255,255,255,.3)');
    shade.addColorStop(1, 'rgba(140,160,210,.35)');
    ctx.fillStyle = shade;
    ctx.fillRect(0, 0, 512, 256);
    for (let i = 0; i < 30; i++) {
      const x = Math.random() * 512;
      const y = 24 + Math.random() * 208;
      const r = 4 + Math.random() * 20;
      const g = ctx.createRadialGradient(x, y, r * 0.15, x, y, r);
      g.addColorStop(0, 'rgba(160,176,214,.5)');
      g.addColorStop(0.75, 'rgba(160,176,214,.2)');
      g.addColorStop(1, 'rgba(160,176,214,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    moonMesh = new THREE.Mesh(
      new THREE.SphereGeometry(7.5, 32, 24),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), fog: false })
    );
    moonMesh.position.copy(MOON_POS);
    scene.add(moonMesh);

    moonInner = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTexCool, color: 0xffffff, transparent: true, opacity: 0.75,
      blending: THREE.AdditiveBlending, depthWrite: false, fog: false,
    }));
    moonInner.scale.set(24, 24, 1);
    moonInner.position.copy(MOON_POS);
    scene.add(moonInner);

    moonHalo = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTexCool, color: 0xdde8ff, transparent: true, opacity: 0.5,
      blending: THREE.AdditiveBlending, depthWrite: false, fog: false,
    }));
    moonHalo.scale.set(64, 64, 1);
    moonHalo.position.copy(MOON_POS);
    scene.add(moonHalo);

    // thin night clouds drifting slowly across the moon
    for (let i = 0; i < 3; i++) {
      const cloud = new THREE.Sprite(new THREE.SpriteMaterial({
        map: glowTexCool, color: 0x131c36, transparent: true,
        opacity: 0.3 + Math.random() * 0.2,
        depthWrite: false, fog: false,
      }));
      cloud.scale.set(30 + Math.random() * 14, 6 + Math.random() * 4, 1);
      cloud.position.set(
        -95 + Math.random() * 70,
        MOON_POS.y - 6 + Math.random() * 12,
        MOON_POS.z + 7 + i * 2         // just in front of the moon
      );
      scene.add(cloud);
      moonClouds.push({ sprite: cloud, speed: 0.5 + Math.random() * 0.7 });
    }
  })();

  /* ── Moonlit forest floor (radial gradient texture) ───────── */
  (function buildGround() {
    const c = document.createElement('canvas');
    c.width = c.height = 512;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(256, 256, 20, 256, 256, 256);
    g.addColorStop(0, '#1d2c47');     // moonlit clearing under the lily
    g.addColorStop(0.35, '#121e36');
    g.addColorStop(0.7, '#0a1222');
    g.addColorStop(1, '#060a14');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 512);
    // scatter faint speckles so the floor reads as earth, not plastic
    for (let i = 0; i < 700; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.pow(Math.random(), 0.6) * 250;
      const l = Math.random();
      ctx.fillStyle = l > 0.5
        ? 'rgba(160, 185, 220, ' + (0.05 + Math.random() * 0.06) + ')'
        : 'rgba(0, 0, 0, ' + (0.1 + Math.random() * 0.12) + ')';
      ctx.fillRect(256 + Math.cos(a) * r, 256 + Math.sin(a) * r, 1.6, 1.6);
    }
    const tex = new THREE.CanvasTexture(c);
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(90, 48),
      new THREE.MeshBasicMaterial({ map: tex })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // a soft contact shadow pools under the lily and grounds it
    const sc = document.createElement('canvas');
    sc.width = sc.height = 128;
    const sctx = sc.getContext('2d');
    const sg = sctx.createRadialGradient(64, 64, 4, 64, 64, 64);
    sg.addColorStop(0, 'rgba(0, 0, 8, .5)');
    sg.addColorStop(0.55, 'rgba(0, 0, 8, .22)');
    sg.addColorStop(1, 'rgba(0, 0, 8, 0)');
    sctx.fillStyle = sg;
    sctx.fillRect(0, 0, 128, 128);
    const shadow = new THREE.Mesh(
      new THREE.PlaneGeometry(3.8, 3.8),
      new THREE.MeshBasicMaterial({
        map: new THREE.CanvasTexture(sc), transparent: true, depthWrite: false,
      })
    );
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.y = 0.02;
    scene.add(shadow);
  })();

  /* ── A faint milky way arcing across the sky ──────────────── */
  (function buildMilkyWay() {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 0, 128);
    g.addColorStop(0, 'rgba(150, 170, 220, 0)');
    g.addColorStop(0.5, 'rgba(190, 205, 240, .5)');
    g.addColorStop(1, 'rgba(150, 170, 220, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 128);
    for (let i = 0; i < 90; i++) {   // starry clumps inside the band
      const x = Math.random() * 512, y = 28 + Math.random() * 72;
      const r = 2 + Math.random() * 10;
      const cg = ctx.createRadialGradient(x, y, 0, x, y, r);
      cg.addColorStop(0, 'rgba(220, 230, 255, .28)');
      cg.addColorStop(1, 'rgba(220, 230, 255, 0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    const mw = new THREE.Mesh(
      new THREE.PlaneGeometry(260, 60),
      new THREE.MeshBasicMaterial({
        map: new THREE.CanvasTexture(c), transparent: true, opacity: 0.16,
        blending: THREE.AdditiveBlending, depthWrite: false, fog: false,
        side: THREE.DoubleSide,
      })
    );
    mw.position.set(60, 80, -60);
    mw.lookAt(0, 0, 0);
    mw.rotateZ(0.6);
    scene.add(mw);
  })();

  /* ── Geometry merging helper (whole forest = 1 draw call) ─── */
  function mergePositions(parts) {
    let total = 0;
    for (const p of parts) total += p.attributes.position.array.length;
    const pos = new Float32Array(total);
    let off = 0;
    for (const p of parts) {
      pos.set(p.attributes.position.array, off);
      off += p.attributes.position.array.length;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    return geo;
  }

  /* ── Pine forest: two silhouette rings for depth ──────────── */
  function addPine(parts, x, z, h) {
    let g = new THREE.CylinderGeometry(h * 0.028, h * 0.05, h * 0.3, 5).toNonIndexed();
    g.translate(x, h * 0.15, z);
    parts.push(g);
    for (let i = 0; i < 3; i++) {
      const tierH = h * 0.42 * (1 - i * 0.16);
      const tierR = h * 0.21 * (1 - i * 0.24);
      const baseY = h * 0.22 + h * 0.62 * (i / 3);
      g = new THREE.ConeGeometry(tierR, tierH, 7).toNonIndexed();
      g.translate(x, baseY + tierH / 2, z);
      parts.push(g);
    }
  }
  function buildForestRing(rMin, rMax, count, hMin, hMax, color) {
    const parts = [];
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2 + Math.random() * 0.5;
      const r = rMin + Math.random() * (rMax - rMin);
      addPine(parts, Math.cos(a) * r, Math.sin(a) * r, hMin + Math.random() * (hMax - hMin));
    }
    const mesh = new THREE.Mesh(
      mergePositions(parts),
      new THREE.MeshBasicMaterial({ color })
    );
    scene.add(mesh);
  }
  buildForestRing(26, 44, 34, 10, 20, 0x081020);  // far, tall, darkest
  buildForestRing(14, 22, 18, 6, 12, 0x0d1930);   // near, lighter = depth

  /* ── Grass tufts around the clearing (1 merged mesh) ──────── */
  (function buildGrass() {
    const bladeCount = isSmallScreen ? 160 : 240;
    const pos = new Float32Array(bladeCount * 9);
    for (let i = 0; i < bladeCount; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = 0.9 + Math.pow(Math.random(), 0.7) * 9;
      const x = Math.cos(a) * r, z = Math.sin(a) * r;
      const h = 0.25 + Math.random() * 0.5;
      const w = 0.03 + Math.random() * 0.04;
      const lean = (Math.random() - 0.5) * 0.3;
      const o = i * 9;
      pos[o]     = x - w; pos[o + 1] = 0;  pos[o + 2] = z;
      pos[o + 3] = x + w; pos[o + 4] = 0;  pos[o + 5] = z;
      pos[o + 6] = x + lean; pos[o + 7] = h; pos[o + 8] = z + lean;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const grass = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
      color: 0x11241e, side: THREE.DoubleSide,
    }));
    scene.add(grass);
  })();

  /* ── ✨ Glowing forest mushrooms (magical detail) ──────────── */
  const mushroomGlows = [];
  (function buildMushrooms() {
    const capMat = new THREE.MeshBasicMaterial({ color: 0x8ef0d2 });
    const stemMat = new THREE.MeshBasicMaterial({ color: 0x9fb8ac });
    const capGeo = new THREE.SphereGeometry(0.09, 8, 6, 0, Math.PI * 2, 0, Math.PI / 2);
    const stemGeo = new THREE.CylinderGeometry(0.028, 0.038, 0.13, 6);
    for (let i = 0; i < 7; i++) {
      const a = (i / 7) * Math.PI * 2 + 0.4;
      const r = 4.5 + Math.random() * 6;
      const x = Math.cos(a) * r, z = Math.sin(a) * r;
      const s = 0.7 + Math.random() * 1.1;

      const stem = new THREE.Mesh(stemGeo, stemMat);
      stem.position.set(x, 0.065 * s, z);
      stem.scale.setScalar(s);
      scene.add(stem);

      const cap = new THREE.Mesh(capGeo, capMat);
      cap.position.set(x, 0.12 * s, z);
      cap.scale.setScalar(s);
      scene.add(cap);

      const glow = new THREE.Sprite(new THREE.SpriteMaterial({
        map: glowTexTeal, color: 0x9df5da, transparent: true, opacity: 0.35,
        blending: THREE.AdditiveBlending, depthWrite: false,
      }));
      glow.scale.set(1.1 * s, 1.1 * s, 1);
      glow.position.set(x, 0.22 * s, z);
      scene.add(glow);
      mushroomGlows.push({ glow, phase: Math.random() * Math.PI * 2, speed: 0.6 + Math.random() });
    }
  })();

  /* ── Drifting ground mist ─────────────────────────────────── */
  const mists = [];
  for (let i = 0; i < 5; i++) {
    const m = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTexCool, color: 0x93a9d6, transparent: true,
      opacity: 0.045 + Math.random() * 0.035,
      blending: THREE.AdditiveBlending, depthWrite: false,
    }));
    m.scale.set(16 + Math.random() * 10, 4.5 + Math.random() * 2.5, 1);
    m.position.set((Math.random() - 0.5) * 30, 0.8 + Math.random() * 1.2, (Math.random() - 0.5) * 24);
    scene.add(m);
    mists.push({
      sprite: m,
      speed: 0.12 + Math.random() * 0.22,
      base: m.material.opacity,
      phase: Math.random() * Math.PI * 2,
    });
  }

  /* ── Starfield: three layers of different sizes & warmth ──── */
  const stars = new THREE.Group();
  const starMats = [];
  function addStarCloud(n, size, opacity, tint, phase) {
    const pos = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
      const r = 100 + Math.random() * 30;
      const t = Math.random() * Math.PI * 2;
      const p = Math.acos(Math.random() * 0.9);
      pos[i * 3]     = r * Math.sin(p) * Math.cos(t);
      pos[i * 3 + 1] = Math.abs(r * Math.cos(p)) + 4;
      pos[i * 3 + 2] = r * Math.sin(p) * Math.sin(t);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
      size, map: glowTexCool, color: tint, transparent: true, opacity,
      depthWrite: false, blending: THREE.AdditiveBlending, fog: false,
    });
    starMats.push({ mat, base: opacity, phase, speed: 1.3 + Math.random() });
    stars.add(new THREE.Points(geo, mat));
  }
  addStarCloud(240, 0.85, 0.75, 0xffffff, 0);      // fine dust of stars
  addStarCloud(60, 1.9, 0.95, 0xcfe0ff, 2.1);      // the bright cold ones
  addStarCloud(36, 1.3, 0.8, 0xffe4c4, 4.2);       // a few warm ones
  scene.add(stars);

  /* ── Floating pollen / forest dust rising in the moonlight ── */
  const pollen = (function () {
    const n = isSmallScreen ? 70 : 110;
    const pos = new Float32Array(n * 3);
    const speed = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      pos[i * 3]     = (Math.random() - 0.5) * 22;
      pos[i * 3 + 1] = 0.2 + Math.random() * 7;
      pos[i * 3 + 2] = (Math.random() - 0.5) * 18;
      speed[i] = 0.1 + Math.random() * 0.25;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const pts = new THREE.Points(geo, new THREE.PointsMaterial({
      size: 0.32, map: glowTexCool, transparent: true, opacity: 0.5,
      depthWrite: false, blending: THREE.AdditiveBlending,
    }));
    scene.add(pts);
    return { pts, pos, speed, n };
  })();

  /* ══════════════════════════════════════════════════════════
     🌸 THE WHITE LILY
     ══════════════════════════════════════════════════════════ */
  const flower = new THREE.Group();
  scene.add(flower);

  /* a lily tepal: tapered silhouette, cupped cross-section, tip that
     recurves backwards, gently ruffled margins and a slight twist —
     the details that make a petal read as grown, not modelled */
  function createPetalGeometry(length, width, curl, cup, ruffle, twist) {
    ruffle = ruffle || 0;
    twist = twist || 0;
    const geo = new THREE.PlaneGeometry(1, 1, 12, 26);
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const t = pos.getY(i) + 0.5;
      const silhouette =
        Math.pow(Math.sin(Math.PI * Math.min(t, 0.999)), 0.8) *
        (0.45 + 0.55 * (1 - t * 0.45));
      const nx = x * width * silhouette;
      const ny = t * length;
      let nz = Math.pow(t, 1.8) * curl + nx * nx * cup;
      // the tip flips further back, like a true lily
      const tip = Math.max(t - 0.72, 0) / 0.28;
      nz += tip * tip * curl * 0.85;
      // ruffled margins: waves strongest at the edge, silent at the midrib
      const edge = Math.min(Math.abs(x) * 2, 1);
      nz += Math.sin(t * Math.PI * 6 + x * 3) * ruffle * edge * Math.sin(Math.PI * t);
      // slight twist along the length
      const tw = twist * t;
      pos.setXYZ(i,
        nx * Math.cos(tw) - nz * Math.sin(tw),
        ny,
        nx * Math.sin(tw) + nz * Math.cos(tw));
    }
    geo.computeVertexNormals();
    return geo;
  }

  /* hand-painted petal skin: greenish throat at the base fading to
     pure white, a centre vein and fine branching veins */
  const petalTex = (function () {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 512;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 512, 0, 0);   // base → tip
    g.addColorStop(0, '#dee9c9');
    g.addColorStop(0.22, '#f2f2e2');
    g.addColorStop(0.55, '#ffffff');
    g.addColorStop(1, '#ffffff');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 256, 512);
    // soft shading toward the edges gives the cup depth
    const sg = ctx.createLinearGradient(0, 0, 256, 0);
    sg.addColorStop(0, 'rgba(188, 198, 214, .28)');
    sg.addColorStop(0.5, 'rgba(255, 255, 255, 0)');
    sg.addColorStop(1, 'rgba(188, 198, 214, .28)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, 256, 512);
    // centre vein
    ctx.strokeStyle = 'rgba(168, 184, 148, .4)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(128, 512);
    ctx.quadraticCurveTo(128, 250, 128, 26);
    ctx.stroke();
    // fine branching veins
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = 'rgba(174, 190, 158, .2)';
    for (let i = 0; i < 7; i++) {
      const y = 468 - i * 62;
      for (const s of [-1, 1]) {
        ctx.beginPath();
        ctx.moveTo(128, y);
        ctx.quadraticCurveTo(128 + s * 55, y - 42, 128 + s * 96, y - 96);
        ctx.stroke();
      }
    }
    return new THREE.CanvasTexture(c);
  })();

  const petalMatOuter = new THREE.MeshStandardMaterial({
    map: petalTex,
    bumpMap: petalTex, bumpScale: 0.015,   // veins catch the light as relief
    color: 0xffffff, emissive: 0x2e3450, roughness: 0.5, side: THREE.DoubleSide,
  });
  const petalMatInner = new THREE.MeshStandardMaterial({
    map: petalTex,
    bumpMap: petalTex, bumpScale: 0.012,
    color: 0xfff6ea, emissive: 0x3a3524, emissiveIntensity: 0.6,
    roughness: 0.45, side: THREE.DoubleSide,
  });

  const head = new THREE.Group();
  head.position.y = HEAD_Y;
  flower.add(head);

  const petalPivots = [];
  let bloomT = -1;   // set when she enters — the lily opens from a bud
  function addPetalRing(count, tilt, length, width, curl, cup, angleOffset, material, ring) {
    for (let i = 0; i < count; i++) {
      // every petal is grown, not copied: its own size, ruffle, twist
      const geo = createPetalGeometry(
        length * (0.93 + Math.random() * 0.14),
        width * (0.92 + Math.random() * 0.16),
        curl * (0.88 + Math.random() * 0.24),
        cup,
        0.045,
        (Math.random() - 0.5) * 0.18
      );
      const pivot = new THREE.Group();
      pivot.rotation.y = angleOffset + (i / count) * Math.PI * 2
                         + (Math.random() - 0.5) * 0.07;
      const petal = new THREE.Mesh(geo, material);
      petal.rotation.x = tilt + (Math.random() - 0.5) * 0.05;
      pivot.add(petal);
      head.add(pivot);
      petalPivots.push({
        petal, baseTilt: petal.rotation.x, ring,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }
  addPetalRing(3, 0.85, 2.1, 1.35, 1.15, 0.55, 0,           petalMatOuter, 0);
  addPetalRing(3, 0.55, 1.95, 1.2, 0.9,  0.6,  Math.PI / 3, petalMatInner, 1);

  /* Stamens: slender filaments that arc outward, each carrying a
     rust-orange anther balanced crosswise at its tip — the signature
     of a real lily. In the middle, one taller pistil with a
     three-lobed stigma. */
  const filamentMat = new THREE.MeshStandardMaterial({ color: 0xe9edd8, roughness: 0.6 });
  const antherMat = new THREE.MeshStandardMaterial({
    color: 0xc27a35, emissive: 0x5a3410, emissiveIntensity: 0.6, roughness: 0.55,
  });
  const UP = new THREE.Vector3(0, 1, 0);
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + 0.3;
    const dx = Math.sin(a), dz = Math.cos(a);
    const lean = 0.42 + Math.random() * 0.14;
    const tipP = new THREE.Vector3(dx * lean, 1.12 + Math.random() * 0.12, dz * lean);
    const filCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(dx * 0.05, 0.12, dz * 0.05),
      new THREE.Vector3(dx * lean * 0.45, 0.68, dz * lean * 0.45),
      tipP,
    ]);
    head.add(new THREE.Mesh(new THREE.TubeGeometry(filCurve, 10, 0.015, 5), filamentMat));

    const anther = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 6), antherMat);
    anther.scale.set(0.42, 1.9, 0.42);
    // the anther hangs almost horizontal, tilted with its filament
    anther.quaternion.setFromUnitVectors(
      UP, new THREE.Vector3(dx, 0.35 + Math.random() * 0.2, dz).normalize());
    anther.position.copy(tipP).add(new THREE.Vector3(dx * 0.06, 0.03, dz * 0.06));
    head.add(anther);
  }
  // the pistil rises above the stamens
  const pistilCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, 0.12, 0),
    new THREE.Vector3(0.04, 0.8, 0.02),
    new THREE.Vector3(0.07, 1.5, 0.05),
  ]);
  head.add(new THREE.Mesh(new THREE.TubeGeometry(pistilCurve, 10, 0.022, 6), filamentMat));
  const stigmaMat = new THREE.MeshStandardMaterial({ color: 0xb8c48f, roughness: 0.6 });
  for (let i = 0; i < 3; i++) {
    const sa = (i / 3) * Math.PI * 2;
    const lobe = new THREE.Mesh(new THREE.SphereGeometry(0.05, 7, 6), stigmaMat);
    lobe.position.set(0.07 + Math.cos(sa) * 0.035, 1.52, 0.05 + Math.sin(sa) * 0.035);
    head.add(lobe);

  /* ✨ Breathing halo around the petals */
  const aura = new THREE.Sprite(new THREE.SpriteMaterial({

    blending: THREE.AdditiveBlending, depthWrite: false,

  const auraWarm = new THREE.Sprite(new THREE.SpriteMaterial({

    blending: THREE.AdditiveBlending, depthWrite: false,
  }));
  auraWarm.scale.set(4, 4, 1);
  auraWarm.position.y = 0.5;
  head.add(auraWarm);

  /* Stem + leaves */
  const stemMat = new THREE.MeshStandardMaterial({ color: 0x35573a, roughness: 0.8 });
  const stemCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0.18, 1.4, 0.06),
    new THREE.Vector3(-0.12, 2.9, -0.05),
    new THREE.Vector3(0, HEAD_Y, 0),
  ]);
  flower.add(new THREE.Mesh(new THREE.TubeGeometry(stemCurve, 24, 0.07, 8), stemMat));

  /* a young closed bud on a side branch — still waiting to open */
  (function buildBud() {
    const branchCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(0, 2.55, 0),
      new THREE.Vector3(0.45, 3.0, 0.12),
      new THREE.Vector3(0.82, 3.32, 0.22),
    ]);
    flower.add(new THREE.Mesh(new THREE.TubeGeometry(branchCurve, 12, 0.042, 6), stemMat));
    const bud = new THREE.Group();
    bud.position.set(0.82, 3.32, 0.22);
    bud.rotation.z = -0.55;
    const budMat = new THREE.MeshStandardMaterial({
      map: petalTex, color: 0xdde6c8, roughness: 0.65, side: THREE.DoubleSide,
    });
    for (let i = 0; i < 5; i++) {
      const pivot = new THREE.Group();
      pivot.rotation.y = (i / 5) * Math.PI * 2;
      const petal = new THREE.Mesh(
        createPetalGeometry(1.0, 0.72, 0.22, 0.85, 0.02, 0.12), budMat);
      petal.rotation.x = 0.12;
      pivot.add(petal);
      bud.add(pivot);
    }
    flower.add(bud);
  })();
  const leafGeo = createPetalGeometry(1.6, 0.9, 0.55, 0.9);
  const leafMat = new THREE.MeshStandardMaterial({
    map: petalTex,        // tinted dark green → subtle leaf veins for free
    color: 0x2f5236, roughness: 0.85, side: THREE.DoubleSide,
  });
  [[1.1, 0.9, 1.9], [1.8, -2.2, 1.75]].forEach(([y, ry, rx]) => {
    const pivot = new THREE.Group();
    pivot.position.y = y;
    pivot.rotation.y = ry;
    const leaf = new THREE.Mesh(leafGeo, leafMat);
    leaf.rotation.x = rx;
    pivot.add(leaf);
    flower.add(pivot);
  });

  /* ── Fireflies ────────────────────────────────────────────── */
  const fireflies = [];
  const fireflyCount = isSmallScreen ? 18 : 32;
  for (let i = 0; i < fireflyCount; i++) {
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTexWarm, color: 0xffe9a8, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false,
    }));
    const scale = 0.35 + Math.random() * 0.45;
    sprite.scale.set(scale, scale, 1);
    const home = new THREE.Vector3(
      (Math.random() - 0.5) * 24,
      0.6 + Math.random() * 9,
      (Math.random() - 0.5) * 20
    );
    sprite.position.copy(home);
    scene.add(sprite);
    fireflies.push({
      sprite, home, baseScale: scale,
      fx: 0.2 + Math.random() * 0.5, fy: 0.2 + Math.random() * 0.4, fz: 0.2 + Math.random() * 0.5,
      ax: 1.2 + Math.random() * 2.2, ay: 0.5 + Math.random() * 1.1, az: 1.2 + Math.random() * 2.2,
      flicker: 1.2 + Math.random() * 2.5,
      phase: Math.random() * Math.PI * 2,
    });
  }

  /* ── Three fireflies keep the lily company, circling close ── */
  const heroFlies = [];
  for (let i = 0; i < 3; i++) {
    const s = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTexWarm, color: 0xffedb0, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false,
    }));
    s.scale.set(0.3, 0.3, 1);
    scene.add(s);
    heroFlies.push({
      s, r: 1.5 + i * 0.45,
      speed: 0.3 + i * 0.13,
      vf: 0.7 + i * 0.35,
      phase: i * 2.1,
    });
  }

  /* ── Loose white petals drifting down from the lily ───────── */
  const fallingPetals = [];
  (function buildFallingPetals() {
    // a soft white petal-shaped sprite
    const c = document.createElement('canvas');
    c.width = 64; c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(32, 64, 4, 32, 64, 60);
    g.addColorStop(0, 'rgba(255,255,252,.95)');
    g.addColorStop(0.55, 'rgba(248,248,244,.75)');
    g.addColorStop(1, 'rgba(240,242,240,0)');
    ctx.fillStyle = g;
    ctx.save();
    ctx.translate(32, 64);
    ctx.scale(0.5, 1);
    ctx.beginPath();
    ctx.arc(0, 0, 58, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    const tex = new THREE.CanvasTexture(c);
    for (let i = 0; i < 6; i++) {
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
        map: tex, transparent: true, opacity: 0.85, depthWrite: false,
        rotation: Math.random() * Math.PI * 2,
      }));
      sprite.scale.set(0.2, 0.34, 1);
      const x0 = (Math.random() - 0.5) * 2.4;
      const z0 = (Math.random() - 0.5) * 2.4;
      sprite.position.set(x0, Math.random() * HEAD_Y, z0);
      scene.add(sprite);
      fallingPetals.push({
        sprite, x0, z0,
        speed: 0.28 + Math.random() * 0.22,
        sway: 0.5 + Math.random() * 0.7,
        phase: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 1.6,
      });
    }
  })();

  /* ══════════════════════════════════════════════════════════
     ✨ 2D overlay: stardust trail + shooting stars
     ══════════════════════════════════════════════════════════ */
  const fx = document.getElementById('fx-canvas');
  const fctx = fx.getContext('2d');
  const DUST_CAP = isSmallScreen ? 120 : 180;
  // pre-rendered glow dots: drawImage is ~20x cheaper per particle
  // than building a radial gradient every frame
  function makeDustSprite(col) {
    const c = document.createElement('canvas');
    c.width = c.height = 32;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
    g.addColorStop(0, 'rgba(' + col + ',1)');
    g.addColorStop(0.4, 'rgba(' + col + ',.45)');
    g.addColorStop(1, 'rgba(' + col + ',0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 32, 32);
    return c;
  }
  const dustWarm = makeDustSprite('255,235,180');
  const dustCool = makeDustSprite('190,210,255');
  let dust = [];
  let shootingStars = [];
  let nextShootingStar = 4;

  function spawnDust(x, y, amount) {
    for (let i = 0; i < amount && dust.length < DUST_CAP; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 0.3 + Math.random() * 1.4;
      dust.push({
        x, y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 0.4,
        life: 1, decay: 0.014 + Math.random() * 0.02,
        size: 1.2 + Math.random() * 2.4,
        warm: Math.random() > 0.4,
      });
    }
  }

  /* a celebration burst (ignores the trail cap — it's a moment ✨) */
  function spawnBurst(x, y, amount) {
    for (let i = 0; i < amount; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 0.8 + Math.random() * 3.4;
      dust.push({
        x, y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 0.6,
        life: 1, decay: 0.007 + Math.random() * 0.012,
        size: 1.4 + Math.random() * 2.6,
        warm: Math.random() > 0.5,
      });
    }
  }

  function updateFx(dt) {
    fctx.clearRect(0, 0, fx.width, fx.height);
    fctx.globalCompositeOperation = 'lighter';

    dust = dust.filter(p => p.life > 0);
    for (const p of dust) {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.01;
      p.life -= p.decay;
      const r = Math.max(p.size * p.life * 4, 0.5);
      fctx.globalAlpha = Math.max(p.life, 0) * 0.9;
      fctx.drawImage(p.warm ? dustWarm : dustCool, p.x - r, p.y - r, r * 2, r * 2);
    }
    fctx.globalAlpha = 1;

    nextShootingStar -= dt;
    if (nextShootingStar <= 0) {
      nextShootingStar = 7 + Math.random() * 9;
      const fromLeft = Math.random() > 0.5;
      shootingStars.push({
        x: fromLeft ? -40 : fx.width + 40,
        y: fx.height * (0.05 + Math.random() * 0.3),
        vx: (fromLeft ? 1 : -1) * (7 + Math.random() * 5),
        vy: 2 + Math.random() * 1.6,
        life: 1,
      });
    }
    shootingStars = shootingStars.filter(s => s.life > 0);
    for (const s of shootingStars) {
      s.x += s.vx; s.y += s.vy;
      s.life -= 0.008;
      if (s.x < -80 || s.x > fx.width + 80) s.life = 0;
      const g = fctx.createLinearGradient(s.x - s.vx * 10, s.y - s.vy * 10, s.x, s.y);
      g.addColorStop(0, 'rgba(200,220,255,0)');
      g.addColorStop(1, 'rgba(255,250,235,' + (0.85 * s.life) + ')');
      fctx.strokeStyle = g;
      fctx.lineWidth = 1.6;
      fctx.beginPath();
      fctx.moveTo(s.x - s.vx * 10, s.y - s.vy * 10);
      fctx.lineTo(s.x, s.y);
      fctx.stroke();
    }
    fctx.globalCompositeOperation = 'source-over';
  }

  /* ══════════════════════════════════════════════════════════
     💬 Messages: orbit the flower → tap one → it becomes a
        bubble she can drag and throw around the screen 🫧
     ══════════════════════════════════════════════════════════ */
  const msgContainer = document.getElementById('messages');
  const msgItems = [];
  let messagesActive = false;

  MESSAGES.forEach((text, i) => {
    const el = document.createElement('div');
    el.className = 'msg';
    el.textContent = text;
    msgContainer.appendChild(el);
    const ring = i % 2;
    const m = {
      el, mode: 'orbit',
      ring,
      radius: ring === 0 ? 0.295 : 0.44,
      speed: ring === 0 ? 0.05 : -0.038,
      baseAngle: (Math.floor(i / 2) / Math.ceil(MESSAGES.length / 2)) * Math.PI * 2
                 + ring * (Math.PI / MESSAGES.length),
      bobPhase: Math.random() * Math.PI * 2,
      // bubble physics
      x: 0, y: 0, curX: 0, curY: 0, vx: 0, vy: 0,
      halfW: 60, halfH: 30,
      dragging: false, pointerId: -1, lastPX: 0, lastPY: 0, lastPT: 0,
    };
    msgItems.push(m);

    /* tap a message → it pops into a bubble and follows her finger */
    el.addEventListener('pointerdown', (e) => {
      if (!messagesActive || !el.classList.contains('visible')) return;
      e.stopPropagation();
      e.preventDefault();
      if (m.mode === 'orbit') {
        m.mode = 'bubble';
        m.x = m.curX; m.y = m.curY;
        m.vx = 0; m.vy = 0;
        el.classList.add('bubble');
        // measure the bubble after it renders (for wall bouncing)
        requestAnimationFrame(() => {
          m.halfW = el.offsetWidth / 2;
          m.halfH = el.offsetHeight / 2;
        });
        spawnDust(e.clientX, e.clientY, 16);
      }
      m.dragging = true;
      m.pointerId = e.pointerId;
      m.lastPX = e.clientX; m.lastPY = e.clientY;
      m.lastPT = performance.now();
      m.vx = 0; m.vy = 0;
      if (el.setPointerCapture) { try { el.setPointerCapture(e.pointerId); } catch (_) {} }
    });
    el.addEventListener('pointermove', (e) => {
      if (!m.dragging || e.pointerId !== m.pointerId) return;
      const now = performance.now();
      const dtMs = Math.max(now - m.lastPT, 1);
      const dx = e.clientX - m.lastPX;
      const dy = e.clientY - m.lastPY;
      m.x += dx; m.y += dy;
      // smoothed velocity in px/frame → a real "throw" on release
      m.vx = 0.55 * m.vx + 0.45 * (dx / dtMs) * 16.7;
      m.vy = 0.55 * m.vy + 0.45 * (dy / dtMs) * 16.7;
      m.lastPX = e.clientX; m.lastPY = e.clientY; m.lastPT = now;
      spawnDust(e.clientX, e.clientY, 1);
    });
    const release = (e) => {
      if (e.pointerId === m.pointerId) { m.dragging = false; m.pointerId = -1; }
    };
    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
  });

  const projV = new THREE.Vector3();
  function headScreenPosition() {
    projV.set(0, HEAD_Y + 0.5, 0).project(camera);
    return {
      x: (projV.x * 0.5 + 0.5) * innerWidth,
      y: (-projV.y * 0.5 + 0.5) * innerHeight,
    };
  }

  function updateMessages(t) {
    if (!messagesActive) return;
    const c = headScreenPosition();
    const minDim = Math.min(innerWidth, innerHeight);
    const stretchX = innerWidth > innerHeight ? 1.35 : 1;
    for (const m of msgItems) {
      if (m.mode === 'orbit') {
        const a = m.baseAngle + t * m.speed;
        m.curX = c.x + Math.cos(a) * m.radius * minDim * stretchX;
        m.curY = c.y + Math.sin(a) * m.radius * minDim * 0.86 +
                 Math.sin(t * 0.8 + m.bobPhase) * 6;
      } else {
        if (!m.dragging) {
          m.x += m.vx; m.y += m.vy;
          m.vx *= 0.988; m.vy *= 0.988;
          // weightless space-drift wobble
          m.vx += Math.sin(t * 0.9 + m.bobPhase) * 0.006;
          m.vy += Math.cos(t * 1.1 + m.bobPhase) * 0.006;
          // soft bounce off the screen edges
          const padX = m.halfW + 6, padY = m.halfH + 6;
          if (m.x < padX)              { m.x = padX;              m.vx = Math.abs(m.vx) * 0.72; }
          if (m.x > innerWidth - padX) { m.x = innerWidth - padX; m.vx = -Math.abs(m.vx) * 0.72; }
          if (m.y < padY)              { m.y = padY;              m.vy = Math.abs(m.vy) * 0.72; }
          if (m.y > innerHeight - padY){ m.y = innerHeight - padY; m.vy = -Math.abs(m.vy) * 0.72; }
        }
        m.curX = m.x; m.curY = m.y;
      }
      m.el.style.transform =
        'translate(-50%,-50%) translate(' + m.curX + 'px,' + m.curY + 'px)';
    }
  }

  function revealMessages() {
    messagesActive = true;
    msgItems.forEach((m, i) => {
      setTimeout(() => m.el.classList.add('visible'), 600 + i * 650);
    });
    const totalDelay = 600 + MESSAGES.length * 650;
    setTimeout(() => {
      const bh = document.getElementById('bubble-hint');
      bh.classList.add('visible');
      setTimeout(() => bh.classList.add('gone'), 7000);
    }, totalDelay + 400);
    setTimeout(() => {
      document.getElementById('gallery-btn').classList.add('visible');
    }, totalDelay + 1800);
    setTimeout(() => {
      document.getElementById('moon-btn').classList.add('visible');
    }, totalDelay + 3600);
  }

  /* ══════════════════════════════════════════════════════════
     📖 The memory book — the cover swings open, then each photo
        is a page that physically turns over the spine (RTL,
        like a real Arabic book: forward = left page turns right)
     ══════════════════════════════════════════════════════════ */
  const gallery = document.getElementById('gallery');
  const bookEl = document.getElementById('book');
  const cover = document.getElementById('cover');
  const leaf = document.getElementById('page-leaf');
  const leafFImg = document.getElementById('leaf-front-img');
  const leafBImg = document.getElementById('leaf-back-img');
  const imgR = document.getElementById('img-right');
  const imgL = document.getElementById('img-left');
  const numR = document.getElementById('num-right');
  const numL = document.getElementById('num-left');
  const book = { k: 0, busy: false };   // spread k shows photos 2k (right) & 2k+1 (left)

  function photoAt(i) {
    return (i >= 0 && i < MEMORIES.length) ? MEMORIES[i] : null;
  }
  function setImg(el, src) {
    if (src) { el.src = src; el.style.visibility = 'visible'; }
    else { el.removeAttribute('src'); el.style.visibility = 'hidden'; }
  }
  function setSpread(k) {
    setImg(imgR, photoAt(2 * k));
    setImg(imgL, photoAt(2 * k + 1));
    numR.textContent = photoAt(2 * k)     ? (2 * k + 1) + ' / ' + MEMORIES.length : '';
    numL.textContent = photoAt(2 * k + 1) ? (2 * k + 2) + ' / ' + MEMORIES.length : '';
    // preload the neighbouring spreads so flips are never blank
    for (const j of [2 * k + 2, 2 * k + 3, 2 * k - 1, 2 * k - 2]) {
      const s = photoAt(j);
      if (s) { const im = new Image(); im.src = s; }
    }
  }

  function flipSpread(dir) {           // +1 forward, -1 back
    if (book.busy || !cover.classList.contains('open')) return;
    if (dir > 0 && 2 * (book.k + 1) >= MEMORIES.length) return;
    if (dir < 0 && book.k <= 0) return;
    book.busy = true;
    const k = book.k;
    if (dir > 0) {
      // the left page lifts and turns over the spine onto the right,
      // carrying the current photo on its front and the next on its back
      setImg(leafFImg, photoAt(2 * k + 1));
      setImg(leafBImg, photoAt(2 * k + 2));
      setImg(imgL, photoAt(2 * k + 3));    // revealed beneath the lifting leaf
      numL.textContent = photoAt(2 * k + 3) ? (2 * k + 4) + ' / ' + MEMORIES.length : '';
      leaf.style.transition = 'none';
      leaf.style.transform = 'rotateY(0deg)';
      leaf.style.display = 'block';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        leaf.style.transition = 'transform .95s cubic-bezier(.42,.08,.22,1)';
        leaf.style.transform = 'rotateY(178deg)';
      }));
    } else {
      // a turned page swings back from the right onto the left
      setImg(leafFImg, photoAt(2 * k - 1));
      setImg(leafBImg, photoAt(2 * k));
      setImg(imgR, photoAt(2 * k - 2));    // revealed beneath on the right
      numR.textContent = (2 * k - 1) + ' / ' + MEMORIES.length;
      leaf.style.transition = 'none';
      leaf.style.transform = 'rotateY(178deg)';
      leaf.style.display = 'block';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        leaf.style.transition = 'transform .95s cubic-bezier(.42,.08,.22,1)';
        leaf.style.transform = 'rotateY(0deg)';
      }));
    }
    setTimeout(() => {
      book.k += dir;
      setSpread(book.k);
      leaf.style.display = 'none';
      book.busy = false;
    }, 1000);
  }

  function openCover() {
    cover.classList.add('open');
    bookEl.classList.add('opened');
  }

  document.getElementById('gallery-btn').addEventListener('click', () => {
    gallery.classList.add('open');
    setSpread(book.k);
    setTimeout(openCover, 900);   // the cover swings open on its own
  });
  // once fully open, tuck the cover away so it doesn't stick out
  cover.addEventListener('transitionend', () => {
    if (cover.classList.contains('open')) cover.classList.add('away');
  });
  document.getElementById('g-close').addEventListener('click', (e) => {
    e.stopPropagation();
    gallery.classList.remove('open');
    setTimeout(() => {
      cover.classList.remove('open', 'away');
      bookEl.classList.remove('opened');
    }, 700);
  });
  document.getElementById('g-next').addEventListener('click', () => flipSpread(1));
  document.getElementById('g-prev').addEventListener('click', () => flipSpread(-1));

  // tapping the book: closed → open it; open → left half turns
  // forward, right half turns back
  bookEl.addEventListener('click', (e) => {
    if (!cover.classList.contains('open')) { openCover(); return; }
    const r = bookEl.getBoundingClientRect();
    flipSpread(e.clientX < r.left + r.width / 2 ? 1 : -1);
  });

  // swipe: dragging toward the right turns the page forward (RTL)
  let swipeGX = null;
  gallery.addEventListener('touchstart', e => { swipeGX = e.touches[0].clientX; }, { passive: true });
  gallery.addEventListener('touchend', e => {
    if (swipeGX === null) return;
    const dx = e.changedTouches[0].clientX - swipeGX;
    if (Math.abs(dx) > 45) flipSpread(dx > 0 ? 1 : -1);
    swipeGX = null;
  }, { passive: true });

  /* ══════════════════════════════════════════════════════════
     🌙 THE MOON ACT — "إنتي القمر يا سيدرا"
     The camera rises from the flower to the moon, four lines
     appear, then her name shimmers beneath the moon itself.
     ══════════════════════════════════════════════════════════ */
  const moonBtn = document.getElementById('moon-btn');
  const moonBack = document.getElementById('moon-back');
  const moonName = document.getElementById('moon-name');
  const moonLinesBox = document.getElementById('moon-lines');
  const moonLines = document.querySelectorAll('.moon-line');
  let moonTimers = [];

  function moonScreenPosition() {
    projV.copy(MOON_POS).project(camera);
    return {
      x: (projV.x * 0.5 + 0.5) * innerWidth,
      y: (-projV.y * 0.5 + 0.5) * innerHeight,
    };
  }

  /* her name sits right beneath the moon, and the words stack
     below the name — clamped so nothing reaches the back button */
  function positionMoonUI() {
    const p = moonScreenPosition();
    const nameY = Math.min(p.y + innerHeight * 0.155, innerHeight * 0.42);
    const linesY = Math.min(p.y + innerHeight * 0.225, innerHeight * 0.50);
    moonName.style.transform =
      'translate(-50%,-50%) translate(' + p.x + 'px,' + nameY + 'px)';
    moonLinesBox.style.top = linesY + 'px';
  }

  function enterMoonMode() {
    if (camState.mode !== 'top') return;
    camState.mode = 'toMoon';
    camState.tStart = clock.getElapsedTime();
    camState.posFrom = camera.position.clone();
    camState.posTo = MOON_CAM_POS.clone();
    camState.lookFrom = lookTarget.clone();
    camState.lookTo = MOON_POS.clone().add(MOON_LOOK_OFFSET);
    // messages & buttons drift away while she's with the moon
    msgContainer.style.opacity = 0;
    msgContainer.style.pointerEvents = 'none';
    document.getElementById('gallery-btn').classList.add('gone');
    moonBtn.classList.add('gone');
    document.getElementById('bubble-hint').classList.add('gone');
  }

  function startMoonSequence() {
    moonLines.forEach((el, i) => {
      moonTimers.push(setTimeout(() => el.classList.add('visible'), 500 + i * 2300));
    });
    const nameAt = 500 + moonLines.length * 2300 + 500;
    moonTimers.push(setTimeout(() => {
      moonName.classList.add('visible');
      const p = moonScreenPosition();
      spawnBurst(p.x, p.y, 70);          // ✨ stardust bursts from the moon
    }, nameAt));
    moonTimers.push(setTimeout(() => moonBack.classList.add('visible'), nameAt + 2200));
  }

  function exitMoonMode() {
    camState.mode = 'fromMoon';
    camState.tStart = clock.getElapsedTime();
    camState.posFrom = camera.position.clone();
    camState.posTo = sphericalPos(TOP_VIEW.radius, TOP_VIEW.phi, camState.theta);
    camState.lookFrom = MOON_POS.clone().add(MOON_LOOK_OFFSET);
    camState.lookTo = lookTarget.clone();
    moonTimers.forEach(clearTimeout);
    moonTimers = [];
    moonLines.forEach(el => el.classList.remove('visible'));
    moonName.classList.remove('visible');
    moonBack.classList.remove('visible');
    msgContainer.style.opacity = 1;
    msgContainer.style.pointerEvents = '';
    document.getElementById('gallery-btn').classList.remove('gone');
    moonBtn.classList.remove('gone');   // she can visit the moon again
  }

  moonBtn.addEventListener('click', enterMoonMode);
  moonBack.addEventListener('click', exitMoonMode);

  /* ══════════════════════════════════════════════════════════
     🎵 Music + intro unlock
     ══════════════════════════════════════════════════════════ */
  const music = document.getElementById('bg-music');
  const musicBtn = document.getElementById('music-btn');
  music.volume = MUSIC_VOLUME;
  let musicStarted = false;
  let musicWanted = false;

  function syncMusicButton() {
    musicBtn.classList.add('visible');
    musicBtn.classList.toggle('playing', !music.paused && !music.ended);
    musicBtn.textContent = music.paused ? '♪' : '♫';
  }

  function startMusic() {
    musicWanted = true;
    musicBtn.classList.add('visible');
    music.preload = 'auto';
    if (music.readyState === 0) music.load();

    return music.play()
      .then(() => {
        musicStarted = true;
        syncMusicButton();
        return true;
      })
      .catch((err) => {
        musicStarted = false;
        syncMusicButton();
        console.warn('Music could not start yet. Tap the music button to retry.', err);
        return false;
      });
  }

  music.addEventListener('play', syncMusicButton);
  music.addEventListener('pause', syncMusicButton);
  music.addEventListener('canplay', () => {
    if (musicWanted && music.paused) startMusic();
  });
  music.addEventListener('error', () => {
    musicStarted = false;
    syncMusicButton();
    console.warn('Music file could not be loaded:', music.error);
  });
  musicBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
  musicBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (music.paused) startMusic();
    else {
      music.pause();
      musicStarted = false;
      syncMusicButton();
    }
  });

  // start buffering quietly in the background once the page has
  // settled, so the song is ready the moment she taps
  setTimeout(() => {
    if (!musicWanted && !musicStarted) { music.preload = 'auto'; music.load(); }
  }, 2500);

  const intro = document.getElementById('intro');
  const hint = document.getElementById('hint');
  let entered = false;   // guards against the intro tap counting twice
  let sceneLive = false; // no 3D work until she enters — a calm, fast load
  intro.addEventListener('pointerdown', () => {
    intro.classList.add('hidden');
    hint.classList.add('visible');
    startMusic();
    sceneLive = true;                  // rendering begins now
    bloomT = clock.getElapsedTime();   // 🌸 the lily blooms open for her
    setTimeout(() => { entered = true; }, 700);
  }, { once: true });

  /* ══════════════════════════════════════════════════════════
     👆 Simple controls:
        · tap anywhere        → glide above the flower
        · swipe up (top view) → visit the moon
        · swipe down (moon)   → come back to the flower
     ══════════════════════════════════════════════════════════ */
  let swipeStart = null;

  window.addEventListener('pointerdown', (e) => {
    spawnDust(e.clientX, e.clientY, 14);
    swipeStart = { y: e.clientY, t: performance.now() };
    if (camState.mode === 'front' && entered) {
      camState.mode = 'transition';
      camState.tStart = clock.getElapsedTime();
      camState.from = { ...FRONT_VIEW };
      camState.to = { ...TOP_VIEW };
      hint.classList.add('gone');
    }
  });

  window.addEventListener('pointerup', (e) => {
    if (!swipeStart) return;
    const dy = e.clientY - swipeStart.y;
    const quick = performance.now() - swipeStart.t < 700;
    swipeStart = null;
    if (!quick || gallery.classList.contains('open')) return;
    if (dy < -70 && camState.mode === 'top') enterMoonMode();
    else if (dy > 70 && camState.mode === 'moon') exitMoonMode();
  });

  let lastTrailT = 0;
  window.addEventListener('pointermove', e => {
    const now = performance.now();
    if (now - lastTrailT < 28) return;   // throttle: touch events can fire 120×/s
    lastTrailT = now;
    if (e.pressure > 0 || e.pointerType === 'mouse') spawnDust(e.clientX, e.clientY, 2);
  });
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  const easeInOut = t => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);
  const lerp = (a, b, t) => a + (b - a) * t;

  /* ══════════════════════════════════════════════════════════
     🌙 Main loop
     ══════════════════════════════════════════════════════════ */
  const clock = new THREE.Clock();
  let lastT = 0;

  function animate() {
    requestAnimationFrame(animate);
    // nothing to draw while the intro covers the screen, and the
    // whole 3D scene sleeps while she's reading the book
    if (!sceneLive || gallery.classList.contains('open')) return;
    const t = clock.getElapsedTime();
    const dt = Math.min(t - lastT, 0.05);
    lastT = t;

    /* the lily is always alive: it blooms open when she enters,
       then keeps breathing, swaying and fluttering forever */
    const bloomK = bloomT < 0 ? 0 : Math.min((t - bloomT) / 5, 1);
    const breath = 1 + 0.028 * Math.sin(t * 1.25);
    head.scale.setScalar((0.9 + 0.1 * easeInOut(bloomK)) * breath);
    // wind arrives in slow, uneven gusts — never a metronome
    const gust = 0.6 + 0.4 * Math.sin(t * 0.13 + Math.sin(t * 0.071) * 2);
    flower.rotation.z = (0.032 + 0.03 * gust) * Math.sin(t * 0.6);
    flower.rotation.x = 0.03 * Math.sin(t * 0.45 + 1.3) * (0.7 + 0.5 * gust);
    for (const p of petalPivots) {
      // inner ring wakes up a moment after the outer one
      const k = bloomT < 0 ? 0
        : Math.min(Math.max((t - bloomT - p.ring * 0.8) / 4.5, 0), 1);
      const open = 0.42 + 0.58 * easeInOut(k);
      p.petal.rotation.x = p.baseTilt * open +
        (0.03 + 0.04 * gust) * k * Math.sin(t * 1.1 + p.phase);
    }
    aura.material.opacity = 0.26 + 0.1 * Math.sin(t * 1.25);
    const auraS = 7 + 0.5 * Math.sin(t * 1.25);        // the halo swells as it breathes
    aura.scale.set(auraS, auraS, 1);
    auraWarm.material.opacity = 0.14 + 0.07 * Math.sin(t * 1.25 + 1);
    warmGlow.intensity = 1.0 + 0.25 * Math.sin(t * 0.9);

    /* fireflies drift, flicker, and swell with their own light */
    for (const f of fireflies) {
      f.sprite.position.set(
        f.home.x + Math.sin(t * f.fx + f.phase) * f.ax,
        f.home.y + Math.sin(t * f.fy + f.phase * 2) * f.ay,
        f.home.z + Math.cos(t * f.fz + f.phase) * f.az
      );
      const fl = Math.abs(Math.sin(t * f.flicker + f.phase));
      f.sprite.material.opacity = 0.25 + 0.75 * fl;
      const fs = f.baseScale * (0.75 + 0.35 * fl);
      f.sprite.scale.set(fs, fs, 1);
    }

    /* the lily's companions circle her slowly */
    for (const h of heroFlies) {
      const a = t * h.speed + h.phase;
      h.s.position.set(
        Math.cos(a) * h.r,
        HEAD_Y + 0.5 + Math.sin(t * h.vf + h.phase) * 0.55,
        Math.sin(a) * h.r
      );
      h.s.material.opacity = 0.3 + 0.7 * Math.abs(Math.sin(t * 1.8 + h.phase));
    }

    /* loose petals spiral slowly down from the flower */
    for (const fp of fallingPetals) {
      const s = fp.sprite;
      s.position.y -= fp.speed * dt;
      s.position.x = fp.x0 + Math.sin(t * fp.sway + fp.phase) * 0.9;
      s.position.z = fp.z0 + Math.cos(t * fp.sway * 0.8 + fp.phase) * 0.7;
      s.material.rotation += fp.spin * dt;
      s.material.opacity = Math.min(s.position.y * 1.4, 0.85);   // melt into the grass
      if (s.position.y < 0.04) {
        s.position.y = HEAD_Y + 0.4;
        fp.x0 = (Math.random() - 0.5) * 2.4;
        fp.z0 = (Math.random() - 0.5) * 2.4;
      }
    }

    /* mushroom glow pulsing */
    for (const m of mushroomGlows) {
      m.glow.material.opacity = 0.22 + 0.2 * Math.abs(Math.sin(t * m.speed + m.phase));
    }

    /* mist drifts sideways, wraps around, and breathes */
    for (const m of mists) {
      m.sprite.position.x += m.speed * dt;
      if (m.sprite.position.x > 22) m.sprite.position.x = -22;
      m.sprite.material.opacity = m.base * (0.7 + 0.3 * Math.sin(t * 0.3 + m.phase));
    }

    /* pollen rises slowly and wraps */
    {
      const arr = pollen.pts.geometry.attributes.position;
      for (let i = 0; i < pollen.n; i++) {
        let y = arr.getY(i) + pollen.speed[i] * dt;
        if (y > 7.5) y = 0.2;
        arr.setY(i, y);
      }
      arr.needsUpdate = true;
    }

    stars.rotation.y = t * 0.003;
    for (const s of starMats) {   // each layer twinkles to its own rhythm
      s.mat.opacity = s.base * (0.8 + 0.2 * Math.sin(t * s.speed + s.phase));
    }

    /* night clouds slide across the moon and wrap around */
    for (const cl of moonClouds) {
      cl.sprite.position.x += cl.speed * dt;
      if (cl.sprite.position.x > -15) cl.sprite.position.x = -95;
    }
    /* the moon breathes — stronger while she's visiting it */
    const moonPulse = camState.mode === 'moon' ? 0.62 : 0.45;
    moonHalo.material.opacity = moonPulse + 0.14 * Math.sin(t * 1.05);
    moonInner.material.opacity = 0.68 + 0.12 * Math.sin(t * 1.05 + 0.7);

    /* camera state machine */
    if (camState.mode === 'transition') {
      const k = Math.min((t - camState.tStart) / TRANSITION_SECS, 1);
      const e = easeInOut(k);
      applySpherical(
        lerp(camState.from.radius, camState.to.radius, e),
        lerp(camState.from.phi, camState.to.phi, e),
        lerp(camState.from.theta, camState.to.theta, e)
      );
      if (k >= 1) {
        camState.mode = 'top';
        camState.theta = camState.to.theta;
        revealMessages();
      }
    } else if (camState.mode === 'top') {
      camState.theta += dt * 0.045;   // dreamy slow orbit above the lily
      applySpherical(
        TOP_VIEW.radius + 0.35 * Math.sin(t * 0.22),   // gentle rise and fall
        TOP_VIEW.phi,
        camState.theta
      );
    } else if (camState.mode === 'toMoon' || camState.mode === 'fromMoon') {
      const k = Math.min((t - camState.tStart) / 3.2, 1);
      const e = easeInOut(k);
      camera.position.lerpVectors(camState.posFrom, camState.posTo, e);
      lookAtV.lerpVectors(camState.lookFrom, camState.lookTo, e);
      camera.lookAt(lookAtV);
      if (k >= 1) {
        if (camState.mode === 'toMoon') {
          camState.mode = 'moon';
          startMoonSequence();
        } else {
          camState.mode = 'top';
        }
      }
    } else if (camState.mode === 'moon') {
      // floating gently under the moon, like lying in the grass
      camera.position.set(
        MOON_CAM_POS.x + 0.35 * Math.sin(t * 0.32),
        MOON_CAM_POS.y + 0.22 * Math.sin(t * 0.47),
        MOON_CAM_POS.z + 0.35 * Math.cos(t * 0.28)
      );
      lookAtV.copy(MOON_POS).add(MOON_LOOK_OFFSET);
      camera.lookAt(lookAtV);
      positionMoonUI();     // name + words stay pinned beneath the moon
    } else {
      applySpherical(
        FRONT_VIEW.radius,
        FRONT_VIEW.phi + 0.012 * Math.sin(t * 0.3),
        FRONT_VIEW.theta + 0.02 * Math.sin(t * 0.22)
      );
    }

    updateMessages(t);
    updateFx(dt);
    renderer.render(scene, camera);
  }

  /* ── Resize ───────────────────────────────────────────────── */
  function resize() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    fx.width = innerWidth;
    fx.height = innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();
  renderer.render(scene, camera);   // warm-up: shaders compile behind the intro
  animate();
})();
</script>
</body>
</html>
